<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>FEN Renderer</title>
  <link rel="stylesheet" href="/src/style.css" />
</head>

<body>
  <header id="page-header">
    <h1>FEN Renderer</h1>
    <nav id="page-nav">
      <a id="open-editor-nav" href="/editor.html">Open Editor &rarr;</a>
    </nav>
  </header>

  <div id="layout">
    <div id="left-panel">
      <input id="fen-input" type="text" placeholder="Enter FEN here" />
      <button id="load-btn">Load FEN</button>

      <h3>FEN Presets</h3>
      <ul id="fen-list"></ul>

      <div class="board-size-control">
        <label for="board-size-slider">
          Board size <span id="board-size-value" class="board-size-value">532px</span>
        </label>
        <input id="board-size-slider" type="range" />
      </div>

      <a id="open-editor-link" href="/editor.html">Edit this position &rarr;</a>
    </div>

    <div id="board"></div>

    <div id="actions-panel">
      <h3>Actions</h3>
      <div id="special-actions"></div>
    </div>

    <div id="carrier-panel">
      <h3>Carrier</h3>
      <div id="carrier-moves"></div>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>

</html>
